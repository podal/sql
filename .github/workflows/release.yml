name: Release to Maven Central

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  maven:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build
        run: mvn -B --no-transfer-progress clean package -DskipTests

      - name: Publish to Maven Central
        run: mvn -B --no-transfer-progress verify gpg:sign central-publishing:publish
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: target/*.jar

  docker-base:
    needs: maven
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: target/

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            podal/sql:${{ needs.maven.outputs.version }}
            podal/sql-jshell:${{ needs.maven.outputs.version }}
          build-args: |
            SQL_VERSION=${{ needs.maven.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  docker:
    needs: [maven, docker-base]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - dockerfile: docker/Dockerfile.all
            tag1: "podal/sql:all-"
            tag2: "podal/sql-jshell:all-"
          - dockerfile: docker/Dockerfile.mariadb
            tag1: "podal/sql:mariadb-"
            tag2: "podal/sql-jshell:mariadb-"
          - dockerfile: docker/Dockerfile.mysql
            tag1: "podal/sql:mysql-"
            tag2: "podal/sql-jshell:mysql-"
          - dockerfile: docker/Dockerfile.oracle
            tag1: "podal/sql:oracle-"
            tag2: "podal/sql-jshell:oracle-"
          - dockerfile: docker/Dockerfile.postgres
            tag1: "podal/sql:postgres-"
            tag2: "podal/sql-jshell:postgres-"
          - dockerfile: docker/Dockerfile.sqlite
            tag1: "podal/sql:sqlite-"
            tag2: "podal/sql-jshell:sqlite-"
#
          - dockerfile: docker/Dockerfile.all
            tag1: "podal/sql-pipe:all-"
            tag2: "podal/sql-pipe:all-"
          - dockerfile: docker/Dockerfile.mariadb
            tag1: "podal/sql-pipe:mariadb-"
            tag2: "podal/sql-pipe:mariadb-"
          - dockerfile: docker/Dockerfile.mysql
            tag1: "podal/sql-pipe:mysql-"
            tag2: "podal/sql-pipe:mysql-"
          - dockerfile: docker/Dockerfile.oracle
            tag1: "podal/sql-pipe:oracle-"
            tag2: "podal/sql-pipe:oracle-"
          - dockerfile: docker/Dockerfile.postgres
            tag1: "podal/sql-pipe:postgres-"
            tag2: "podal/sql-pipe:postgres-"
          - dockerfile: docker/Dockerfile.sqlite
            tag1: "podal/sql-pipe:sqlite-"
            tag2: "podal/sql-pipe:sqlite-"


    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ matrix.tag1 }}${{ needs.maven.outputs.version }}
            ${{ matrix.tag2 }}${{ needs.maven.outputs.version }}
          build-args: |
            SQL_VERSION=${{ needs.maven.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
